<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb Agent Pro | Dashboard Amélioré</title>
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --primary: #FF5A5F;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --info: #3B82F6;
    }
    [data-theme="dark"] {
      --bg-primary: #111827;
      --bg-secondary: #1f2937;
      --bg-tertiary: #374151;
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --border-color: #374151;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #E04A4F 100%);
      color: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 22px; display: flex; align-items: center; gap: 12px; }
    .theme-toggle {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-secondary);
      padding: 24px;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
    .stat-card h3 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
    .filters-bar {
      background: var(--bg-secondary);
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .filter-group { display: flex; gap: 8px; }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .inquiry-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      border-left: 4px solid transparent;
      transition: transform 0.2s;
    }
    .inquiry-card:hover { transform: translateX(4px); }
    .inquiry-card.high { border-left-color: var(--success); }
    .inquiry-card.medium { border-left-color: var(--warning); }
    .inquiry-card.low { border-left-color: var(--danger); }
    .inquiry-preview {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .client-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #E04A4F);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600;
    }
    .score-high { background: #D1FAE5; color: #065F46; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .score-medium { background: #FEF3C7; color: #92400E; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .score-low { background: #FEE2E2; color: #991B1B; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-secondary);
      border-radius: 16px; width: 100%; max-width: 800px; max-height: 90vh;
      overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 24px; border-bottom: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-secondary); }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 20px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: var(--info); color: white; }
    .response-box { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 8px; padding: 20px; margin-top: 16px; }
    .response-text { font-family: Georgia, serif; font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
    .chart-container { background: var(--bg-secondary); padding: 24px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 24px; }
    .mini-chart { display: flex; align-items: flex-end; gap: 8px; height: 100px; padding: 16px 0; }
    .chart-bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; min-height: 20px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🤖 Airbnb Agent Pro</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </header>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3>En attente</h3>
        <div class="stat-value" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <h3>Traités</h3>
        <div class="stat-value" id="stat-processed">0</div>
      </div>
      <div class="stat-card">
        <h3>Conversion</h3>
        <div class="stat-value" id="stat-conversion">0%</div>
      </div>
      <div class="stat-card">
        <h3>Revenu moyen</h3>
        <div class="stat-value" id="stat-revenue">0€</div>
      </div>
    </div>

    <div class="chart-container">
      <h3>📊 Activité des 7 derniers jours</h3>
      <div class="mini-chart" id="activity-chart"></div>
    </div>

    <div class="filters-bar">
      <div class="filter-group">
        <button class="filter-btn active" onclick="filterInquiries('all')">Tous</button>
        <button class="filter-btn" onclick="filterInquiries('pending')">En attente</button>
        <button class="filter-btn" onclick="filterInquiries('approved')">Approuvés</button>
        <button class="filter-btn" onclick="filterInquiries('rejected')">Refusés</button>
      </div>
      <input type="text" id="search" placeholder="Rechercher..." onkeyup="searchInquiries()" style="padding:8px 16px;border:1px solid var(--border-color);border-radius:8px;">
    </div>

    <div id="inquiries-list"></div>
  </div>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modal-title">Détail</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script>
    const sampleData = [
      { id: '001', client: 'Alexandra', event: 'Mariage', guests: 50, score: 20, status: 'pending', flags: ['Capacité dépassée'], message: '50 invités pour un mariage', response: 'Désolé, max 40 pers.', price: null },
      { id: '002', client: 'Hanna', event: 'Cousinade', guests: null, score: 50, status: 'pending', flags: [], message: 'Quelle capacité ?', response: 'Jusqu\'à 40 pers. Visite possible.', price: null },
      { id: '003', client: 'Camille', event: 'Anniversaire', guests: 25, score: 75, status: 'approved', flags: [], message: 'Repas anniversaire', response: 'C\'est envisageable. Visite ce dimanche ?', price: 900 },
      { id: '004', client: 'Lisa', event: 'Conciergerie', guests: null, score: 60, status: 'pending', flags: ['Pro'], message: 'Proposition partenariat', response: 'Quel est votre modèle économique ?', price: null },
    ];

    let inquiries = JSON.parse(localStorage.getItem('inquiries') || JSON.stringify(sampleData));
    let currentFilter = 'all';

    function init() {
      loadTheme();
      updateStats();
      renderChart();
      renderInquiries();
    }

    function loadTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      loadTheme();
    }

    function updateStats() {
      const pending = inquiries.filter(i => i.status === 'pending').length;
      const processed = inquiries.filter(i => i.status === 'approved' || i.status === 'rejected').length;
      const approved = inquiries.filter(i => i.status === 'approved').length;
      const conversion = processed > 0 ? Math.round((approved / processed) * 100) : 0;
      const revenues = inquiries.filter(i => i.price).map(i => i.price);
      const avgRevenue = revenues.length > 0 ? Math.round(revenues.reduce((a,b) => a+b, 0) / revenues.length) : 0;

      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-processed').textContent = processed;
      document.getElementById('stat-conversion').textContent = conversion + '%';
      document.getElementById('stat-revenue').textContent = avgRevenue + '€';
    }

    function renderChart() {
      const chart = document.getElementById('activity-chart');
      const days = [12, 8, 15, 10, 18, 22, 14]; // Demo data
      chart.innerHTML = days.map(v => `<div class="chart-bar" style="height:${v * 4}px" title="${v} demandes"></div>`).join('');
    }

    function filterInquiries(status) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderInquiries();
    }

    function searchInquiries() {
      renderInquiries();
    }

    function renderInquiries() {
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = inquiries.filter(i => {
        const matchesFilter = currentFilter === 'all' || i.status === currentFilter;
        const matchesSearch = i.client.toLowerCase().includes(search) || i.event.toLowerCase().includes(search);
        return matchesFilter && matchesSearch;
      });

      const list = document.getElementById('inquiries-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px;background:var(--bg-secondary);border-radius:12px;"><h2>Aucune demande</h2></div>';
        return;
      }

      list.innerHTML = filtered.map(i => `
        <div class="inquiry-card ${i.score >= 70 ? 'high' : i.score >= 40 ? 'medium' : 'low'}" onclick="openModal('${i.id}')">
          <div class="inquiry-preview">
            <div style="display:flex;align-items:center;gap:16px;">
              <div class="client-avatar">${i.client[0]}</div>
              <div>
                <h3 style="font-size:16px;font-weight:600;">${i.client} <span style="font-size:13px;color:var(--text-secondary);font-weight:normal;">• ${i.event}</span></h3>
                <div style="font-size:13px;color:var(--text-secondary);">${i.guests || '?'} pers • Score: ${i.score}/100</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="${i.score >= 70 ? 'score-high' : i.score >= 40 ? 'score-medium' : 'score-low'}">${i.score}/100</span>
              <span style="padding:4px 12px;border-radius:12px;font-size:12px;background:${i.status === 'approved' ? 'var(--success)' : i.status === 'rejected' ? 'var(--danger)' : 'var(--warning)'};color:white;">${i.status}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openModal(id) {
      const i = inquiries.find(x => x.id === id);
      document.getElementById('modal-title').textContent = `Demande de ${i.client}`;
      document.getElementById('modal-body').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
          <div style="padding:16px;background:var(--bg-tertiary);border-radius:8px;"><label style="font-size:11px;color:var(--text-secondary);">ÉVÉNEMENT</label><div style="font-weight:600;">${i.event}</div></div>
          <div style="padding:16px;background:var(--bg-tertiary);border-radius:8px;"><label style="font-size:11px;color:var(--text-secondary);">PERSONNES</label><div style="font-weight:600;">${i.guests || '?'}</div></div>
          <div style="padding:16px;background:var(--bg-tertiary);border-radius:8px;"><label style="font-size:11px;color:var(--text-secondary);">SCORE</label><div style="font-weight:600;">${i.score}/100</div></div>
        </div>
        <div style="background:var(--bg-tertiary);padding:16px;border-radius:8px;margin-bottom:16px;">
          <label style="font-size:11px;color:var(--text-secondary);">MESSAGE CLIENT</label>
          <p>${i.message}</p>
        </div>
        <div class="response-box">
          <label style="font-size:11px;color:var(--info);font-weight:600;">RÉPONSE PROPOSÉE</label>
          <div class="response-text">${i.response}</div>
        </div>
      `;
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-secondary" onclick="editResponse('${i.id}')">✏️ Modifier</button>
        ${i.status === 'pending' ? `
          <button class="btn btn-danger" onclick="rejectInquiry('${i.id}')">❌ Refuser</button>
          <button class="btn btn-success" onclick="approveInquiry('${i.id}')">✅ Approuver</button>
        ` : `<button class="btn btn-secondary" onclick="closeModal()">Fermer</button>`}
      `;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal(e) {
      if (!e || e.target.id === 'modal') {
        document.getElementById('modal').classList.remove('active');
      }
    }

    function approveInquiry(id) {
      const i = inquiries.find(x => x.id === id);
      i.status = 'approved';
      if (!i.price) i.price = 900;
      localStorage.setItem('inquiries', JSON.stringify(inquiries));
      updateStats();
      renderInquiries();
      closeModal();
      alert('✅ Réponse approuvée et enregistrée !');
    }

    function rejectInquiry(id) {
      const i = inquiries.find(x => x.id === id);
      i.status = 'rejected';
      localStorage.setItem('inquiries', JSON.stringify(inquiries));
      updateStats();
      renderInquiries();
      closeModal();
      alert('❌ Demande refusée.');
    }

    function editResponse(id) {
      const i = inquiries.find(x => x.id === id);
      const newResponse = prompt('Modifier la réponse :', i.response);
      if (newResponse !== null) {
        i.response = newResponse;
        localStorage.setItem('inquiries', JSON.stringify(inquiries));
        openModal(id);
      }
    }

    init();
  </script>
</body>
</html>
