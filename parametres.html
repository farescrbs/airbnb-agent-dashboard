<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paramètres - Airbnb Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #15151f;
      border-bottom: 1px solid #252538;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    
    .logo { font-weight: 700; color: #FF5A5F; font-size: 18px; }
    .menu-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      padding: 8px;
    }
    
    .nav {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #15151f;
      z-index: 99;
      display: none;
      flex-direction: column;
      padding: 20px;
    }
    .nav.active { display: flex; }
    .nav a {
      color: #8b8b9e;
      text-decoration: none;
      padding: 16px;
      font-size: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav a.active, .nav a:hover {
      background: #FF5A5F;
      color: #fff;
    }
    
    .content {
      padding: 76px 16px 100px;
      max-width: 100%;
    }
    
    h1 { font-size: 24px; margin-bottom: 20px; }
    
    .card {
      background: #252538;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 {
      font-size: 16px;
      margin-bottom: 20px;
      color: #8b8b9e;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #8b8b9e;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 14px;
      background: #1f1f2e;
      border: 1px solid #252538;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #FF5A5F;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #FF5A5F;
      color: #fff;
    }
    .btn-secondary {
      background: #252538;
      color: #fff;
      border: 1px solid #252538;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: #15151f;
      border-top: 1px solid #252538;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav a {
      color: #8b8b9e;
      text-decoration: none;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
    }
    .bottom-nav a.active { color: #FF5A5F; }
    .bottom-nav a span { font-size: 20px; }
    
    @media (min-width: 768px) {
      .content { max-width: 1200px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }
      .bottom-nav { display: none; }
      .nav { display: flex !important; position: fixed; left: 0; top: 0; bottom: 0; width: 240px; right: auto; }
      .header { left: 240px; }
      .content { margin-left: 240px; }
      .menu-btn { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖 Airbnb Agent</div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
  
  <nav class="nav" id="nav">
    <a href="index.html">📊 Dashboard</a>
    <a href="demandes.html">📨 Demandes</a>
    <a href="statistiques.html">📈 Stats</a>
    <a href="parametres.html" class="active">⚙️ Paramètres</a>
  </nav>
  
  <div class="content">
    <h1>Paramètres</h1>
    
    <div class="card">
      <h3>Propriété</h3>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" value="L'Extérieur de Verfeil">
      </div>
      <div class="form-group">
        <label>Capacité max</label>
        <input type="number" value="40">
      </div>
      <button class="btn btn-primary">💾 Enregistrer</button>
    </div>
    
    <div class="card">
      <h3>Tarification</h3>
      <div class="form-group">
        <label>Tarif jour (€)</label>
        <input type="number" value="900">
      </div>
      <div class="form-group">
        <label>Surcharge groupe +30 pers (€)</label>
        <input type="number" value="150">
      </div>
      <button class="btn btn-primary">💾 Enregistrer</button>
    </div>
    
    <div class="card">
      <h3>Compte</h3>
      <button class="btn btn-secondary">🔒 Changer mot de passe</button>
      <button class="btn btn-danger">🚪 Déconnexion</button>
    </div>
  </div>
  
  <nav class="bottom-nav">
    <a href="index.html"><span>📊</span>Dashboard</a>
    <a href="demandes.html"><span>📨</span>Demandes</a>
    <a href="statistiques.html"><span>📈</span>Stats</a>
    <a href="parametres.html" class="active"><span>⚙️</span>Réglages</a>
  </nav>
  
  <script>
    function toggleMenu() {
      document.getElementById('nav').classList.toggle('active');
    }
  </script>
</body>
</html>
