<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stats - Airbnb Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #15151f;
      border-bottom: 1px solid #252538;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    
    .logo { font-weight: 700; color: #FF5A5F; font-size: 18px; }
    .menu-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      padding: 8px;
    }
    
    .nav {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #15151f;
      z-index: 99;
      display: none;
      flex-direction: column;
      padding: 20px;
    }
    .nav.active { display: flex; }
    .nav a {
      color: #8b8b9e;
      text-decoration: none;
      padding: 16px;
      font-size: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav a.active, .nav a:hover {
      background: #FF5A5F;
      color: #fff;
    }
    
    .content {
      padding: 76px 16px 100px;
      max-width: 100%;
    }
    
    h1 { font-size: 24px; margin-bottom: 20px; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat {
      background: #252538;
      border-radius: 16px;
      padding: 16px;
    }
    .stat-label {
      font-size: 12px;
      color: #8b8b9e;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }
    
    .card {
      background: #252538;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #8b8b9e;
    }
    
    .chart-placeholder {
      height: 200px;
      background: #1f1f2e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b8b9e;
      font-size: 14px;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: #15151f;
      border-top: 1px solid #252538;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav a {
      color: #8b8b9e;
      text-decoration: none;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
    }
    .bottom-nav a.active { color: #FF5A5F; }
    .bottom-nav a span { font-size: 20px; }
    
    @media (min-width: 768px) {
      .content { max-width: 1200px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }
      .stats { grid-template-columns: repeat(4, 1fr); }
      .bottom-nav { display: none; }
      .nav { display: flex !important; position: fixed; left: 0; top: 0; bottom: 0; width: 240px; right: auto; }
      .header { left: 240px; }
      .content { margin-left: 240px; }
      .menu-btn { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖 Airbnb Agent</div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>
  
  <nav class="nav" id="nav">
    <a href="index.html">📊 Dashboard</a>
    <a href="demandes.html">📨 Demandes</a>
    <a href="statistiques.html" class="active">📈 Stats</a>
    <a href="parametres.html">⚙️ Paramètres</a>
  </nav>
  
  <div class="content">
    <h1>Statistiques</h1>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total demandes</div>
        <div class="stat-value" style="color: #FF5A5F;">127</div>
      </div>
      <div class="stat">
        <div class="stat-label">Conversion</div>
        <div class="stat-value" style="color: #10B981;">68%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Revenus</div>
        <div class="stat-value" style="color: #F59E0B;">45.2k</div>
      </div>
      <div class="stat">
        <div class="stat-label">Panier moyen</div>
        <div class="stat-value" style="color: #3B82F6;">920€</div>
      </div>
    </div>
    
    <div class="card">
      <h3>Évolution des demandes</h3>
      <div class="chart-placeholder">📊 Graphique ici</div>
    </div>
    
    <div class="card">
      <h3>Types d'événements</h3>
      <div class="chart-placeholder">🥧 Camembert ici</div>
    </div>
  </div>
  
  <nav class="bottom-nav">
    <a href="index.html"><span>📊</span>Dashboard</a>
    <a href="demandes.html"><span>📨</span>Demandes</a>
    <a href="statistiques.html" class="active"><span>📈</span>Stats</a>
    <a href="parametres.html"><span>⚙️</span>Réglages</a>
  </nav>
  
  <script>
    function toggleMenu() {
      document.getElementById('nav').classList.toggle('active');
    }
  </script>
</body>
</html>
