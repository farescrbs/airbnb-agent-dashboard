<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demandes — Airbnb Agent Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">🤖 Agent Pro</div>
      
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link">
            <span>📊</span> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="demandes.html" class="nav-link active">
            <span>📨</span> Demandes
          </a>
        </li>
        <li class="nav-item">
          <a href="statistiques.html" class="nav-link">
            <span>📈</span> Statistiques
          </a>
        </li>
        <li class="nav-item">
          <a href="parametres.html" class="nav-link">
            <span>⚙️</span> Paramètres
          </a>
        </li>
      </ul>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name">Admin</div>
            <div class="user-role">Propriétaire</div>
          </div>
        </div>
        <button onclick="auth.logout()" style="background:none;border:none;color:var(--gray);cursor:pointer;margin-top:8px;font-size:0.8rem;">Déconnexion</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <div class="header">
        <h2>Toutes les demandes</h2>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="exportData()">📥 Exporter</button>
          <button class="btn btn-primary" onclick="refreshData()">🔄 Actualiser</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">Toutes</button>
          <button class="filter-tab" data-filter="pending">En attente</button>
          <button class="filter-tab" data-filter="approved">Approuvées</button>
          <button class="filter-tab" data-filter="rejected">Refusées</button>
        </div>
        <div class="search-box">
          <input type="text" id="search" placeholder="Rechercher un client, événement...">
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Événement</th>
              <th>Date</th>
              <th>Personnes</th>
              <th>Score</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="demandes-table">
            <!-- Filled by JS -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <button class="btn btn-secondary" disabled>← Précédent</button>
        <span>Page 1 sur 1</span>
        <button class="btn btn-secondary" disabled>Suivant →</button>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3>Détail de la demande</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Filled by JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
        <button class="btn btn-secondary" onclick="editResponse()">✏️ Modifier réponse</button>
        <button class="btn" style="background: var(--danger); color: white;" onclick="rejectInquiry()">❌ Refuser</button>
        <button class="btn btn-primary" onclick="approveInquiry()">✅ Approuver</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/demandes.js"></script>
</body>
</html>
