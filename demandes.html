<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>HostFlow - Demandes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00d4ff; --secondary: #7c3aed; --accent: #f472b6; --dark: #0a0a0f; --dark-light: #13131f; --dark-card: #1a1a2e; --dark-hover: #252542; --text: #ffffff; --text-muted: #8b8b9e; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.5; overflow-x: hidden; }
    .bg-animation { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%); pointer-events: none; z-index: 0; }
    .header { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(19, 19, 31, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 212, 255, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); } 50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6); } }
    .logo-text { font-weight: 700; font-size: 20px; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .menu-btn { width: 44px; height: 44px; background: var(--dark-card); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; color: var(--primary); font-size: 20px; cursor: pointer; }
    .sidenav { position: fixed; top: 70px; left: 0; bottom: 0; width: 280px; background: rgba(19, 19, 31, 0.98); backdrop-filter: blur(20px); border-right: 1px solid rgba(0, 212, 255, 0.1); padding: 24px 16px; transform: translateX(-100%); transition: transform 0.3s ease; z-index: 999; }
    .sidenav.active { transform: translateX(0); }
    .nav-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; padding-left: 12px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: var(--text-muted); text-decoration: none; border-radius: 12px; margin-bottom: 4px; font-size: 15px; font-weight: 500; }
    .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; }
    .main { padding: 90px 20px 100px; position: relative; z-index: 1; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-subtitle { color: var(--text-muted); margin-bottom: 24px; }
    .section { background: var(--dark-card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 600; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; }
    .btn-secondary { background: var(--dark-hover); color: var(--text); border: 1px solid rgba(0, 212, 255, 0.2); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
    .filter-chip { padding: 10px 18px; background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 25px; color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .filter-chip.active { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; border-color: transparent; }
    .inquiry-list { display: flex; flex-direction: column; gap: 12px; }
    .inquiry-card { background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.05); border-radius: 16px; padding: 16px; position: relative; }
    .inquiry-card.urgent { border-left: 4px solid var(--danger); }
    .inquiry-card.warning { border-left: 4px solid var(--warning); }
    .inquiry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .inquiry-client { display: flex; align-items: center; gap: 12px; }
    .client-avatar { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; }
    .client-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .client-info p { font-size: 13px; color: var(--text-muted); }
    .score-badge { width: 44px; height: 44px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .score-badge.high { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .score-badge.medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .score-badge.low { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .inquiry-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .inquiry-preview { font-size: 14px; color: var(--text-muted); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .inquiry-actions { display: flex; gap: 8px; margin-top: 16px; }
    .inquiry-actions .btn { flex: 1; padding: 10px; font-size: 13px; }
    .response-time { position: absolute; top: 16px; right: 16px; font-size: 11px; padding: 4px 8px; border-radius: 8px; font-weight: 600; }
    .response-time.good { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .response-time.warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .response-time.danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fit-score { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 10px; margin-left: 8px; font-weight: 600; }
    .fit-score.good { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .fit-score.medium { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .fit-score.bad { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .red-flags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .red-flag { font-size: 11px; padding: 4px 10px; border-radius: 10px; background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); display: none; align-items: flex-end; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--dark-card); border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(0, 212, 255, 0.1); position: sticky; top: 0; background: var(--dark-card); z-index: 10; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { width: 36px; height: 36px; background: var(--dark-hover); border: none; border-radius: 10px; color: var(--text-muted); font-size: 20px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; gap: 12px; padding: 20px; border-top: 1px solid rgba(0, 212, 255, 0.1); }
    .modal-footer .btn { flex: 1; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .detail-item { background: var(--dark-hover); border-radius: 12px; padding: 16px; }
    .detail-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
    .detail-value { font-size: 16px; font-weight: 600; }
    .response-box { background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    textarea { width: 100%; min-height: 200px; background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px; padding: 16px; color: #fff; font-size: 14px; line-height: 1.6; font-family: inherit; resize: vertical; }
    textarea:focus { outline: none; border-color: var(--primary); }
    .template-buttons { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .template-btn { padding: 8px 14px; background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 8px; color: var(--text-muted); font-size: 12px; cursor: pointer; }
    .template-btn:hover { border-color: var(--primary); color: var(--primary); }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(19, 19, 31, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(0, 212, 255, 0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 1000; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 500; }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item span:first-child { font-size: 22px; }
    @media (min-width: 1024px) { .header { left: 280px; } .sidenav { transform: translateX(0); } .main { margin-left: 280px; padding: 90px 32px 40px; } .menu-btn, .bottom-nav { display: none; } .modal { max-width: 700px; border-radius: 24px; margin: 40px auto; max-height: 80vh; } }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <header class="header">
    <a href="index.html" class="logo"><div class="logo-icon">🤖</div><div class="logo-text">HostFlow</div></a>
    <button class="menu-btn" onclick="toggleNav()">☰</button>
  </header>
  <nav class="sidenav" id="sidenav">
    <div class="nav-title">Menu Principal</div>
    <a href="index.html" class="nav-item"><span>📊</span>Dashboard</a>
    <a href="demandes.html" class="nav-item active"><span>📨</span>Demandes<span class="nav-badge">3</span></a>
    <a href="statistiques.html" class="nav-item"><span>📈</span>Statistiques</a>
    <div class="nav-title">Configuration</div>
    <a href="parametres.html" class="nav-item"><span>⚙️</span>Paramètres</a>
  </nav>
  <main class="main">
    <h1 class="page-title">Toutes les demandes</h1>
    <p class="page-subtitle">Gérez et qualifiez vos demandes</p>
    <div class="section">
      <div class="filters">
        <button class="filter-chip active" onclick="filterInquiries('all')">Toutes</button>
        <button class="filter-chip" onclick="filterInquiries('pending')">En attente</button>
        <button class="filter-chip" onclick="filterInquiries('urgent')">⚠️ Urgentes</button>
        <button class="filter-chip" onclick="filterInquiries('approved')">Approuvées</button>
        <button class="filter-chip" onclick="filterInquiries('rejected')">Refusées</button>
      </div>
      <div class="inquiry-list" id="inquiryList"></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><span>📊</span>Dashboard</a>
    <a href="demandes.html" class="bottom-nav-item active"><span>📨</span>Demandes</a>
    <a href="statistiques.html" class="bottom-nav-item"><span>📈</span>Stats</a>
    <a href="parametres.html" class="bottom-nav-item"><span>⚙️</span>Réglages</a>
  </nav>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">✏️ Voir & Éditer la réponse</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn btn-warning" onclick="saveDraft()">💾 Brouillon</button>
        <button class="btn btn-primary" onclick="approveAndSend()">✅ Approuver & Envoyer à Jarvis</button>
      </div>
    </div>
  </div>
  <script>
    const inquiries = [
      { id: 1, name: 'Marie Dubois', initials: 'MD', event: 'Anniversaire', date: '15 juillet 2026', guests: 25, price: 900, score: 92, fitScore: 95, waitTime: 45, status: 'pending', message: 'Bonjour, je souhaite organiser un anniversaire pour 25 personnes le 15 juillet. Est-ce possible ?', response: 'Bonjour Marie,\n\nMerci pour votre intérêt ! Votre anniversaire du 15 juillet pour 25 personnes est tout à fait envisageable.\n\n✓ Capacité : 25/40 personnes\n✓ Date : disponible à confirmer\n✓ Équipements : tables, chaises, BBQ, frigos inclus\n\nLe tarif pour cette configuration est de 900€.\n\nJe vous propose de venir visiter l\'espace pour vous projeter. Je suis flexible sur les créneaux.\n\nCela correspond toujours à votre projet ?\n\nÀ bientôt,\nHostFlow', redFlags: [] },
      { id: 2, name: 'Thomas Laurent', initials: 'TL', event: 'Cousinade', date: '22 août 2026', guests: 35, price: 1050, score: 65, fitScore: 70, waitTime: 120, status: 'pending', message: 'Bonjour, nous sommes une famille de 35 personnes et souhaitons organiser une cousinade.', response: 'Bonjour Thomas,\n\nMerci pour votre demande. Pour 35 personnes, le tarif est de 1050€ (900€ + 150€ surcharge groupe).\n\nCordialement,\nHostFlow', redFlags: ['Groupe important'] },
      { id: 3, name: 'Sophie Martin', initials: 'SM', event: 'Baby Shower', date: '5 septembre 2026', guests: 20, price: 900, score: 88, fitScore: 90, waitTime: 5, status: 'approved', message: 'Bonjour, je souhaite organiser un baby shower pour 20 personnes.', response: 'Bonjour Sophie,\n\nAvec plaisir ! Le baby shower pour 20 personnes est possible au tarif de 900€.\n\nÀ bientôt,\nHostFlow', redFlags: [] },
      { id: 4, name: 'Pierre Durand', initials: 'PD', event: 'Mariage', date: '12 juillet 2026', guests: 45, price: 0, score: 25, fitScore: 20, waitTime: 180, status: 'pending', message: 'Bonjour, nous organisons notre mariage pour 45 personnes.', response: '', redFlags: ['>40 personnes', 'Mariage', 'Budget non précisé'] }
    ];
    let currentInquiry = null;
    let currentFilter = 'all';
    function getFitScoreClass(score) { return score >= 80 ? 'good' : score >= 50 ? 'medium' : 'bad'; }
    function getWaitTimeClass(minutes) { return minutes < 30 ? 'good' : minutes < 60 ? 'warning' : 'danger'; }
    function getCardClass(minutes, status) { if (status !== 'pending') return ''; return minutes > 60 ? 'urgent' : minutes > 30 ? 'warning' : ''; }
    function renderInquiries(filter = 'all') {
      const list = document.getElementById('inquiryList');
      let filtered = inquiries;
      if (filter === 'pending') filtered = inquiries.filter(i => i.status === 'pending');
      else if (filter === 'urgent') filtered = inquiries.filter(i => i.status === 'pending' && i.waitTime > 30);
      else if (filter === 'approved') filtered = inquiries.filter(i => i.status === 'approved');
      else if (filter === 'rejected') filtered = inquiries.filter(i => i.status === 'rejected');
      list.innerHTML = filtered.map(i => `
        <div class="inquiry-card ${getCardClass(i.waitTime, i.status)}">
          ${i.status === 'pending' ? `<span class="response-time ${getWaitTimeClass(i.waitTime)}">${i.waitTime} min</span>` : ''}
          <div class="inquiry-header">
            <div class="inquiry-client">
              <div class="client-avatar">${i.initials}</div>
              <div class="client-info">
                <h4>${i.name} <span class="fit-score ${getFitScoreClass(i.fitScore)}">Fit: ${i.fitScore}%</span></h4>
                <p>${i.event} • ${i.guests} pers.</p>
              </div>
            </div>
            <div class="score-badge ${i.score >= 70 ? 'high' : i.score >= 40 ? 'medium' : 'low'}">${i.score}</div>
          </div>
          <div class="inquiry-meta"><span>📅 ${i.date}</span><span>💰 ${i.price || 'N/A'}€</span></div>
          <div class="inquiry-preview">${i.message}</div>
          ${i.redFlags.length ? `<div class="red-flags">${i.redFlags.map(f => `<span class="red-flag">⚠️ ${f}</span>`).join('')}</div>` : ''}
          <div class="inquiry-actions">
            ${i.status === 'pending' ? `
              <button class="btn btn-secondary" onclick="event.stopPropagation(); viewInquiry(${i.id})">👁 Voir & Éditer</button>
              <button class="btn btn-success" onclick="event.stopPropagation(); quickApprove(${i.id})">✓ Approuver</button>
              <button class="btn btn-danger" onclick="event.stopPropagation(); rejectInquiry(${i.id})">✗ Refuser</button>
            ` : `<span style="color: ${i.status === 'approved' ? 'var(--success)' : 'var(--danger)'}; font-weight: 600;">${i.status === 'approved' ? '✓ Approuvée' : '✗ Refusée'}</span>`}
          </div>
        </div>
      `).join('');
    }
    function toggleNav() { document.getElementById('sidenav').classList.toggle('active'); }
    document.addEventListener('click', (e) => { const nav = document.getElementById('sidenav'); const btn = document.querySelector('.menu-btn'); if (!nav.contains(e.target) && !btn.contains(e.target)) nav.classList.remove('active'); });
    function filterInquiries(status) { document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); event.target.classList.add('active'); currentFilter = status; renderInquiries(status); }
    function viewInquiry(id) {
      currentInquiry = inquiries.find(i => i.id === id);
      if (!currentInquiry) return;
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Client</div><div class="detail-value">${currentInquiry.name}</div></div>
          <div class="detail-item"><div class="detail-label">Événement</div><div class="detail-value">${currentInquiry.event}</div></div>
          <div class="detail-item"><div class="detail-label">Date</div><div class="detail-value">${currentInquiry.date}</div></div>
          <div class="detail-item"><div class="detail-label">Personnes</div><div class="detail-value">${currentInquiry.guests}</div></div>
          <div class="detail-item"><div class="detail-label">Prix</div><div class="detail-value">${currentInquiry.price || 'N/A'}€</div></div>
          <div class="detail-item"><div class="detail-label">Score</div><div class="detail-value">${currentInquiry.score}/100</div></div>
        </div>
        <div style="margin-bottom: 16px;"><div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;">Message du client</div><div class="response-box">${currentInquiry.message}</div></div>
        <div>
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;">Réponse à envoyer (éditable)</div>
          <div class="template-buttons">
            <button class="template-btn" onclick="insertTemplate('standard')">Standard</button>
            <button class="template-btn" onclick="insertTemplate('visite')">+ Visite</button>
            <button class="template-btn" onclick="insertTemplate('clarification')">Clarification</button>
          </div>
          <textarea id="responseText">${currentInquiry.response || generateDefaultResponse(currentInquiry)}</textarea>
        </div>
      `;
      document.getElementById('modal').classList.add('active');
    }
    function generateDefaultResponse(inquiry) {
      return `Bonjour ${inquiry.name},\n\nMerci pour votre intérêt concernant votre ${inquiry.event.toLowerCase()}.\n\nPour ${inquiry.guests} personnes, le tarif est de ${inquiry.price || 'XXX'}€.\n\nJe vous propose de venir visiter l'espace pour vous projeter.\n\nÀ bientôt,\nHostFlow`;
    }
    function insertTemplate(type) {
      const textarea = document.getElementById('responseText');
      const templates = {
        standard: '\n\nJe reste disponible pour toute question.',
        visite: '\n\nJe vous propose de venir visiter l\'espace. Mes disponibilités :\n- Lundi 10h-18h\n- Mercredi 14h-19h\n- Samedi 10h-12h',
        clarification: '\n\nPourriez-vous me préciser :\n- Le nombre exact de personnes ?\n- Si vous avez besoin de couchage sur place ?\n- Votre budget approximatif ?'
      };
      textarea.value += templates[type] || '';
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function saveDraft() { alert('Brouillon sauvegardé ! 💾'); closeModal(); }
    function approveAndSend() {
      const responseText = document.getElementById('responseText').value;
      if (currentInquiry) {
        currentInquiry.response = responseText;
        currentInquiry.status = 'approved';
        alert(`✅ Demande approuvée !\n\nLa réponse a été envoyée à Jarvis pour validation finale.\n\n📧 Client: ${currentInquiry.name}\n💬 Réponse: ${responseText.substring(0, 100)}...\n\nJarvis va vérifier et envoyer le mail.`);
        closeModal();
        renderInquiries(currentFilter);
      }
    }
    function quickApprove(id) { viewInquiry(id); }
    function rejectInquiry(id) { if (confirm('Refuser cette demande ?')) { const i = inquiries.find(x => x.id === id); if (i) { i.status = 'rejected'; renderInquiries(currentFilter); } } }
    setInterval(() => { inquiries.forEach(i => { if (i.status === 'pending') i.waitTime++; }); renderInquiries(currentFilter); }, 60000);
    renderInquiries();
  </script>
</body>
</html>
