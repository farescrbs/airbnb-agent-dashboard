<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis AI - Demandes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00d4ff; --secondary: #7c3aed; --accent: #f472b6;
      --dark: #0a0a0f; --dark-light: #13131f; --dark-card: #1a1a2e; --dark-hover: #252542;
      --text: #ffffff; --text-muted: #8b8b9e;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark); color: var(--text);
      line-height: 1.5; overflow-x: hidden;
    }
    .bg-animation {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: rgba(19, 19, 31, 0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
      50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.6); }
    }
    .logo-text {
      font-weight: 700; font-size: 20px;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .menu-btn {
      width: 44px; height: 44px; background: var(--dark-card);
      border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 12px;
      color: var(--primary); font-size: 20px; cursor: pointer;
    }
    .sidenav {
      position: fixed; top: 70px; left: 0; bottom: 0; width: 280px;
      background: rgba(19, 19, 31, 0.98); backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 212, 255, 0.1);
      padding: 24px 16px; transform: translateX(-100%);
      transition: transform 0.3s ease; z-index: 999;
    }
    .sidenav.active { transform: translateX(0); }
    .nav-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; padding-left: 12px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      color: var(--text-muted); text-decoration: none; border-radius: 12px;
      margin-bottom: 4px; font-size: 15px; font-weight: 500;
    }
    .nav-item:hover, .nav-item.active { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; }
    .nav-badge { margin-left: auto; background: var(--danger); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .main { padding: 90px 20px 100px; position: relative; z-index: 1; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-subtitle { color: var(--text-muted); margin-bottom: 24px; }
    .section { background: var(--dark-card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 600; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; }
    .btn-secondary { background: var(--dark-hover); color: var(--text); border: 1px solid rgba(0, 212, 255, 0.2); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
    .filter-chip { padding: 10px 18px; background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 25px; color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .filter-chip.active { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: white; border-color: transparent; }
    .inquiry-list { display: flex; flex-direction: column; gap: 12px; }
    .inquiry-card { background: var(--dark-hover); border: 1px solid rgba(0, 212, 255, 0.05); border-radius: 16px; padding: 16px; }
    .inquiry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .inquiry-client { display: flex; align-items: center; gap: 12px; }
    .client-avatar { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; }
    .client-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .client-info p { font-size: 13px; color: var(--text-muted); }
    .score-badge { width: 44px; height: 44px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .score-badge.high { background: rgba(16, 185, 129, 0.15); color: var(--success); }
    .score-badge.medium { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .inquiry-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .inquiry-preview { font-size: 14px; color: var(--text-muted); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .inquiry-actions { display: flex; gap: 8px; margin-top: 16px; }
    .inquiry-actions .btn { flex: 1; justify-content: center; padding: 10px; font-size: 13px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(19, 19, 31, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(0, 212, 255, 0.1); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom, 0); z-index: 1000; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; color: var(--text-muted); text-decoration: none; font-size: 11px; font-weight: 500; }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item span:first-child { font-size: 22px; }
    @media (min-width: 1024px) {
      .header { left: 280px; } .sidenav { transform: translateX(0); } .main { margin-left: 280px; padding: 90px 32px 40px; } .menu-btn, .bottom-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <header class="header">
    <a href="index.html" class="logo"><div class="logo-icon">🤖</div><div class="logo-text">Jarvis AI</div></a>
    <button class="menu-btn" onclick="toggleNav()">☰</button>
  </header>
  <nav class="sidenav" id="sidenav">
    <div class="nav-title">Menu Principal</div>
    <a href="index.html" class="nav-item"><span>📊</span>Dashboard</a>
    <a href="demandes.html" class="nav-item active"><span>📨</span>Demandes<span class="nav-badge">3</span></a>
    <a href="statistiques.html" class="nav-item"><span>📈</span>Statistiques</a>
    <div class="nav-title">Configuration</div>
    <a href="parametres.html" class="nav-item"><span>⚙️</span>Paramètres</a>
  </nav>
  <main class="main">
    <h1 class="page-title">Toutes les demandes</h1>
    <p class="page-subtitle">Gérez vos demandes de location</p>
    <div class="section">
      <div class="filters">
        <button class="filter-chip active" onclick="filterInquiries('all')">Toutes</button>
        <button class="filter-chip" onclick="filterInquiries('pending')">En attente</button>
        <button class="filter-chip" onclick="filterInquiries('approved')">Approuvées</button>
        <button class="filter-chip" onclick="filterInquiries('rejected')">Refusées</button>
      </div>
      <div class="inquiry-list" id="inquiryList"></div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><span>📊</span>Dashboard</a>
    <a href="demandes.html" class="bottom-nav-item active"><span>📨</span>Demandes</a>
    <a href="statistiques.html" class="bottom-nav-item"><span>📈</span>Stats</a>
    <a href="parametres.html" class="bottom-nav-item"><span>⚙️</span>Réglages</a>
  </nav>
  <script>
    const inquiries = [
      { id: 1, name: 'Marie Dubois', initials: 'MD', event: 'Anniversaire', date: '15 juillet 2026', guests: 25, price: 900, score: 92, status: 'pending', message: 'Bonjour, je souhaite organiser un anniversaire pour 25 personnes.' },
      { id: 2, name: 'Thomas Laurent', initials: 'TL', event: 'Cousinade', date: '22 août 2026', guests: 35, price: 1050, score: 65, status: 'pending', message: 'Bonjour, nous sommes une famille de 35 personnes.' },
      { id: 3, name: 'Sophie Martin', initials: 'SM', event: 'Baby Shower', date: '5 septembre 2026', guests: 20, price: 900, score: 88, status: 'approved', message: 'Bonjour, je souhaite organiser un baby shower.' },
      { id: 4, name: 'Pierre Durand', initials: 'PD', event: 'EVG', date: '12 juillet 2026', guests: 15, price: 900, score: 45, status: 'rejected', message: 'Bonjour, nous sommes un groupe de 15 personnes.' }
    ];
    function renderInquiries(filter = 'all') {
      const list = document.getElementById('inquiryList');
      const filtered = filter === 'all' ? inquiries : inquiries.filter(i => i.status === filter);
      list.innerHTML = filtered.map(i => `
        <div class="inquiry-card">
          <div class="inquiry-header">
            <div class="inquiry-client">
              <div class="client-avatar">${i.initials}</div>
              <div class="client-info"><h4>${i.name}</h4><p>${i.event}</p></div>
            </div>
            <div class="score-badge ${i.score >= 70 ? 'high' : 'medium'}">${i.score}</div>
          </div>
          <div class="inquiry-meta"><span>📅 ${i.date}</span><span>👥 ${i.guests} pers.</span><span>💰 ${i.price}€</span></div>
          <div class="inquiry-preview">${i.message}</div>
          <div class="inquiry-actions">
            ${i.status === 'pending' ? `
              <button class="btn btn-success" onclick="updateStatus(${i.id}, 'approved')">✓ Approuver</button>
              <button class="btn btn-danger" onclick="updateStatus(${i.id}, 'rejected')">✗ Refuser</button>
            ` : `<span style="color: ${i.status === 'approved' ? 'var(--success)' : 'var(--danger)'}; font-weight: 600;">${i.status === 'approved' ? '✓ Approuvée' : '✗ Refusée'}</span>`}
          </div>
        </div>
      `).join('');
    }
    function toggleNav() { document.getElementById('sidenav').classList.toggle('active'); }
    document.addEventListener('click', (e) => { const nav = document.getElementById('sidenav'); const btn = document.querySelector('.menu-btn'); if (!nav.contains(e.target) && !btn.contains(e.target)) nav.classList.remove('active'); });
    function filterInquiries(status) { document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); event.target.classList.add('active'); renderInquiries(status); }
    function updateStatus(id, status) { const i = inquiries.find(x => x.id === id); if (i) { i.status = status; renderInquiries(); } }
    document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', function() { document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active')); this.classList.add('active'); }));
    renderInquiries();
  </script>
</body>
</html>
